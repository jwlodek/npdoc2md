---

name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@8ca4608ef7f4daeb54f5205b20d0b7cb42f11143  # v0.8.14
        with:
          pixi-version: v0.56.0
          cache: false
          frozen: true

      - name: Run linting checks
        run: pixi run lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [310, 311, 312, 313, 314]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@8ca4608ef7f4daeb54f5205b20d0b7cb42f11143  # v0.8.14
        with:
          pixi-version: v0.56.0
          cache: true
          frozen: true

      - name: Run tests for given python version
        run: pixi run -e py${{ matrix.python-version }} pytest --cov=npdoc2md --cov-report=xml --cov-report=term
